<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnyApp - Geografia Ameryki</title>
    <style>
        :root {
            --primary: #00d2ff; --primary-dark: #0086a6; --wrong: #ff4b4b; --wrong-dark: #ea2b2b;
            --bg: #0b0f19; --text: #f0f4f8; --card-bg: #171e30; --gray: #2c3754; --blue: #00f0ff;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        button, a, .exit-btn, .match-btn, .option-btn { -webkit-tap-highlight-color: transparent; }

        .app-screen { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; flex-direction: column; flex-grow: 1; }
        .app-screen.active { display: flex; }
        .top-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; width: 100%; }
        .exit-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #77849c; text-decoration: none; }
        .progress-bar { flex-grow: 1; height: 16px; background-color: var(--gray); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--primary); width: 0%; transition: width 0.3s; box-shadow: 0 0 10px var(--blue); }
        .hearts { color: var(--wrong); font-size: 22px; font-weight: bold; }
        .question-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: var(--blue); }
        .word-to-translate { font-size: 22px; color: #ffffff; text-align: center; margin-bottom: 30px; font-weight: bold; line-height: 1.4; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: var(--card-bg); border: 2px solid var(--gray); border-bottom-width: 4px; border-radius: 15px; padding: 14px 20px; font-size: 16px; cursor: pointer; text-align: left; color: var(--text); }
        .option-btn.selected { border-color: var(--blue); background-color: rgba(0, 240, 255, 0.1); }
        .option-btn.correct { border-color: #58cc02; background-color: rgba(88, 204, 2, 0.15); color: #58cc02; }
        .option-btn.wrong { border-color: var(--wrong); background-color: rgba(255, 75, 75, 0.15); color: var(--wrong); }
        .input-container { display: flex; flex-direction: column; gap: 15px; }
        .text-input { width: 100%; padding: 15px; font-size: 18px; border: 2px solid var(--gray); border-radius: 15px; box-sizing: border-box; outline: none; background-color: var(--card-bg); color: #fff; }
        .text-input:focus { border-color: var(--blue); }
        .matching-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .match-btn { background-color: var(--card-bg); border: 2px solid var(--gray); border-bottom-width: 4px; border-radius: 12px; padding: 12px 6px; font-size: 12px; cursor: pointer; text-align: center; color: var(--text); font-weight: 500; }
        .match-btn.selected { border-color: var(--blue); background-color: rgba(0, 240, 255, 0.1); }
        .match-btn.matched { visibility: hidden; }
        .footer { margin-top: auto; padding-top: 25px; padding-bottom: 10px; }
        .check-btn { width: 100%; background-color: var(--gray); color: #52638c; border: none; border-radius: 15px; padding: 18px; font-size: 18px; font-weight: bold; text-transform: uppercase; cursor: not-allowed; }
        .check-btn.active { background-color: var(--primary); color: #0b0f19; cursor: pointer; box-shadow: 0 4px 0 var(--primary-dark); }
        .btn-main { background-color: var(--primary); color: #0b0f19; border: none; border-bottom: 4px solid var(--primary-dark); border-radius: 15px; padding: 18px; font-size: 20px; font-weight: bold; text-transform: uppercase; width: 100%; cursor: pointer; text-shadow: none; }
    </style>
</head>
<body>

<div id="screen-quiz" class="app-screen active">
    <div class="top-bar">
        <a href="index.html" class="exit-btn">✖️</a>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        <div class="hearts" id="hearts-display">❤️ 3</div>
    </div>
    <div id="game-zone"></div>
    <div class="footer"><button class="check-btn" id="check-btn">Sprawdź</button></div>
</div>

<div id="screen-win" class="app-screen" style="text-align: center;">
    <h1 style="color: var(--blue); font-size: 36px; margin-top: 10vh; text-shadow: 0 0 10px rgba(0,240,255,0.4)">Genialnie! 🎉</h1>
    <p>Znasz Amerykę jak własną kieszeń!</p>
    <a href="index.html" class="btn-main" style="text-decoration: none; display: block; text-align: center; box-sizing: border-box;">Wróć do menu</a>
</div>

<div id="screen-lose" class="app-screen" style="text-align: center;">
    <h1 style="color: var(--wrong); font-size: 36px; margin-top: 10vh;">Poprawka! 💔</h1>
    <p>Skończyły Ci się szanse. Przejrzyj materiał w menu.</p>
    <a href="index.html" class="btn-main" style="text-decoration: none; display: block; text-align: center; box-sizing: border-box; background-color: var(--gray); border-bottom-color: #1a233a; color: #fff;">Wróć do menu</a>
</div>

<script>
    const vocabulary = [
        { de: "Największy system rzeczny Ameryki Płd.", pl: "Amazonka" },
        { de: "W jakiej strefie leży Ameryka Środkowa?", pl: "międzyzwrotnikowej" },
        { de: "Skutek tornada (drzewa)", pl: "wyrywanie z korzeniami" },
        { de: "Skutek cyklonu (opady)", pl: "podtopienia i powodzie" },
        { de: "Lokalna nazwa cyklonu w Azji Wschodniej", pl: "tajfun" },
        { de: "Skala do określania siły tornad", pl: "Fujity" },
        { de: "Skala do określania siły cyklonów", pl: "Saffira-Simpsona" },
        { de: "Główny układ form rzeźby terenu Ameryki", pl: "południkowy" },
        { de: "Potomkowie białej odmiany i Indian", pl: "Metysi" },
        { de: "Potomkowie odmiany czarnej i Indian", pl: "Zambo" },
        { de: "Potomkowie odmiany białej i czarnej", pl: "Mulaci" },
        { de: "Światowe centrum branży IT w USA", pl: "Dolina Krzemowa" },
        { de: "Negatywny skutek wylesiania Amazonii", pl: "utrata bioróżnorodności" },
        { de: "Przyczyna powstawania slumsów (faveli)", pl: "zbyt duży napływ ludności" }
    ];

    let currentQuestionIndex = 0, hearts = 3, isAnswerChecked = false, currentTaskType = "", questions = [];
    let selectedChoice = null, selectedMatchItem = null, completedPairsCount = 0;

    function initGame() {
        let pool = [...vocabulary].sort(() => Math.random() - 0.5);
        questions = pool.slice(0, 5).map(item => {
            let rand = Math.random();
            let type = rand > 0.66 ? "input" : (rand > 0.33 ? "match" : "choice");
            return { item, type };
        });
        loadTask();
    }

    function loadTask() {
        isAnswerChecked = false; selectedChoice = null; selectedMatchItem = null; completedPairsCount = 0;
        const checkBtn = document.getElementById('check-btn');
        checkBtn.className = 'check-btn'; checkBtn.textContent = 'Sprawdź'; checkBtn.style.backgroundColor = '';

        if (currentQuestionIndex >= questions.length) {
            document.getElementById('screen-quiz').classList.remove('active');
            document.getElementById('screen-win').classList.add('active');
            return;
        }

        const task = questions[currentQuestionIndex];
        currentTaskType = task.type;
        const zone = document.getElementById('game-zone');
        zone.innerHTML = "";

        if (currentTaskType === "choice") {
            zone.innerHTML = `<div class="question-header">Wybierz poprawne uzupełnienie:</div><div class="word-to-translate">${task.item.de}</div><div class="options-grid" id="options-box"></div>`;
            let options = [task.item.pl];
            let wrongPool = [...new Set(vocabulary.filter(v => v.pl !== task.item.pl).map(v => v.pl))].sort(() => Math.random() - 0.5);
            for(let i=0; i<3; i++) if(wrongPool[i]) options.push(wrongPool[i]);
            options.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.textContent = opt;
                btn.onclick = () => { if(isAnswerChecked) return; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedChoice = opt; checkBtn.classList.add('active'); };
                document.getElementById('options-box').appendChild(btn);
            });
        } else if (currentTaskType === "input") {
            zone.innerHTML = `<div class="question-header">Wpisz prawidłowe pojęcie geograficzne:</div><div class="word-to-translate" style="color:var(--blue);">${task.item.de}</div><div class="input-container"><input type="text" class="text-input" id="typed-answer" placeholder="Wpisz odpowiedź..." autocomplete="off"></div>`;
            const input = document.getElementById('typed-answer'); input.focus();
            input.oninput = () => { if(input.value.trim().length > 0) checkBtn.classList.add('active'); else checkBtn.classList.remove('active'); };
        } else if (currentTaskType === "match") {
            zone.innerHTML = `<div class="question-header" style="margin-bottom:20px;">Połącz pojęcia:</div><div class="matching-grid" id="matching-box"></div>`;
            let pairPool = vocabulary.filter(v => v.de !== task.item.de).sort(() => Math.random() - 0.5);
            let currentPairs = [task.item, pairPool[0], pairPool[1]];
            let elements = [];
            currentPairs.forEach(p => { elements.push({ text: p.de, lang: 'de', match: p.pl }); elements.push({ text: p.pl, lang: 'pl', match: p.de }); });
            elements.sort(() => Math.random() - 0.5).forEach(el => {
                const btn = document.createElement('button'); btn.className = 'match-btn'; btn.textContent = el.text; btn.dataset.lang = el.lang; btn.dataset.match = el.match;
                btn.onclick = () => handleMatchClick(btn);
                document.getElementById('matching-box').appendChild(btn);
            });
        }
        updateProgress();
    }

    function handleMatchClick(btn) {
        if(btn.classList.contains('matched')) return;
        if (!selectedMatchItem) { btn.classList.add('selected'); selectedMatchItem = btn; } 
        else {
            if (selectedMatchItem === btn) { btn.classList.remove('selected'); selectedMatchItem = null; return; }
            if (selectedMatchItem.dataset.lang !== btn.dataset.lang && selectedMatchItem.dataset.match === btn.textContent) {
                selectedMatchItem.className = 'match-btn matched'; btn.className = 'match-btn matched'; selectedMatchItem = null; completedPairsCount++;
                if (completedPairsCount === 3) { isAnswerChecked = true; const cb = document.getElementById('check-btn'); cb.classList.add('active'); cb.textContent = 'Dalej'; cb.style.backgroundColor = 'var(--primary)'; }
            } else { selectedMatchItem.classList.remove('selected'); btn.classList.add('selected'); selectedMatchItem = btn; }
        }
    }

    document.getElementById('check-btn').onclick = () => {
        const checkBtn = document.getElementById('check-btn');
        if (!checkBtn.classList.contains('active')) return;
        const task = questions[currentQuestionIndex];

        if (!isAnswerChecked) {
            isAnswerChecked = true; let isCorrect = false;
            if (currentTaskType === "choice") {
                document.querySelectorAll('.option-btn').forEach(btn => { if (btn.textContent === task.item.pl) btn.classList.add('correct'); if (btn.classList.contains('selected') && selectedChoice !== task.item.pl) btn.classList.add('wrong'); });
                isCorrect = (selectedChoice === task.item.pl);
            } else if (currentTaskType === "input") {
                const typed = document.getElementById('typed-answer').value.trim().toLowerCase();
                const correctAns = task.item.pl.toLowerCase();
                const zone = document.getElementById('game-zone');
                if (typed === correctAns) { isCorrect = true; zone.innerHTML += `<div style="color:var(--blue);font-weight:bold;margin-top:20px;text-align:center;">Genialnie!</div>`; } 
                else { isCorrect = false; zone.innerHTML += `<div style="color:var(--wrong);font-weight:bold;margin-top:20px;text-align:center;">Błąd! Prawidłowo: <br><b style="font-size:22px;color:#fff;">${task.item.pl}</b></div>`; }
            } else if (currentTaskType === "match") { isCorrect = true; }

            if (isCorrect) { checkBtn.textContent = 'Dalej'; checkBtn.style.backgroundColor = 'var(--primary)'; } 
            else { hearts--; updateHearts(); checkBtn.textContent = 'Dalej'; checkBtn.style.backgroundColor = 'var(--wrong)'; if (hearts <= 0) { document.getElementById('screen-quiz').className = 'app-screen'; document.getElementById('screen-lose').className = 'app-screen active'; } }
        } else { currentQuestionIndex++; loadTask(); }
    };

    function updateHearts() { document.getElementById('hearts-display').textContent = `❤️ ${hearts}`; }
    function updateProgress() { document.getElementById('progress').style.width = `${(currentQuestionIndex / questions.length) * 100}%`; }
    initGame();
</script>
</body>
</html>
