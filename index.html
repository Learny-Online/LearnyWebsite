<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnyApp</title>
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dark: #0086a6;
            --bg: #0b0f19;
            --text: #f0f4f8;
            --card-bg: #171e30;
            --gray: #2c3754;
            --blue: #00f0ff;
            --blue-dark: #00a8b5;
            --warning-bg: #2a2115;
            --warning-border: #ffaa00;
            --warning-text: #ffaa00;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Wyłączenie domyślnego niebieskiego podświetlenia na telefonie */
        button, a, .subject-btn, .lesson-link, .study-btn, .match-btn, .option-btn {
            -webkit-tap-highlight-color: transparent;
        }

        .app-screen {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            flex-direction: column;
            flex-grow: 1;
            animation: fadeIn 0.3s ease;
        }
        .app-screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 8vh;
            margin-bottom: 20px;
        }
        .main-logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 25px;
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }
        .title-huge {
            color: var(--primary); font-size: 46px; font-weight: 900; text-align: center; letter-spacing: 1px; margin: 0;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.6);
        }

        .warning-box {
            background-color: var(--warning-bg); border: 2px solid var(--warning-border); color: var(--warning-text); padding: 15px; border-radius: 15px; text-align: center; font-weight: bold; font-size: 14px; line-height: 1.4; margin-bottom: 40px;
        }
        .btn-main {
            background-color: var(--primary); color: #0b0f19; border: none; border-bottom: 4px solid var(--primary-dark); border-radius: 15px; padding: 18px; font-size: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; transition: all 0.1s;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }
        .btn-main:active { border-bottom-width: 0; transform: translateY(4px); box-shadow: none; }

        .header-title { font-size: 28px; font-weight: bold; text-align: center; margin-top: 20px; margin-bottom: 30px; color: var(--blue); }
        
        .subject-btn {
            background-color: var(--card-bg); border: 2px solid var(--gray); border-bottom-width: 4px; border-radius: 15px; padding: 18px; font-size: 18px; font-weight: bold; color: var(--text); cursor: pointer; width: 100%; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
        }
        .subject-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
        .subject-icon {
            width: 35px; height: 35px; object-fit: contain;
        }
        .subject-text { flex-grow: 1; text-align: left; }

        .sub-materials { display: none; flex-direction: column; gap: 10px; padding: 0 5px 15px 5px; }
        .sub-materials.open { display: flex; }
        
        .lesson-row { display: flex; gap: 8px; width: 100%; }
        .lesson-link {
            flex-grow: 2; background-color: rgba(0, 240, 255, 0.1); border: 2px solid var(--blue-dark); border-bottom-width: 4px; border-radius: 12px; padding: 15px; font-size: 15px; font-weight: bold; color: var(--blue); cursor: pointer; text-align: left; text-decoration: none; display: block;
        }
        .lesson-link:active { border-bottom-width: 2px; transform: translateY(2px); }
        
        .study-btn {
            flex-grow: 1; background-color: rgba(255, 255, 255, 0.05); border: 2px solid var(--gray); border-bottom-width: 4px; border-radius: 12px; padding: 15px 10px; font-size: 14px; font-weight: bold; color: #fff; cursor: pointer; text-align: center; white-space: nowrap;
        }
        .study-btn:active { border-bottom-width: 2px; transform: translateY(2px); }
        .empty-btn { background-color: rgba(255,255,255,0.02); border: 2px solid var(--gray); border-radius: 12px; padding: 15px; font-size: 15px; color: #77849c; width: 100%; text-align: left; border-bottom-width: 4px; }

        .study-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; overflow-y: auto; max-height: 60vh; padding-right: 5px; }
        .study-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); border: 2px solid var(--gray); border-radius: 12px; padding: 14px; font-size: 15px; }
        .study-left { font-weight: bold; color: var(--blue); width: 50%; }
        .study-right { color: #ffffff; width: 48%; text-align: right; }
        .exit-btn { background: none; border: none; font-size: 16px; cursor: pointer; color: #77849c; padding: 5px; display: flex; align-items: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="screen-welcome" class="app-screen active">
    <div class="logo-container">
        <img src="logo.png" alt="LearnyApp Logo" class="main-logo">
        <div class="title-huge">LearnyApp</div>
    </div>
    
    <div class="warning-box">
        ⚠️ STRONA INSPIROWANA DUOLINGO ⚠️
    </div>
    <div style="margin-top: auto; padding-bottom: 20px;">
        <button class="btn-main" onclick="switchScreen('screen-materials')">Kontynuuj</button>
    </div>
</div>

<div id="screen-materials" class="app-screen">
    <div class="header-title">Wybierz materiał</div>
    
    <button class="subject-btn" onclick="toggleSub('sub-eng')">
        <span class="subject-text">Język angielski</span> <span>▼</span>
    </button>
    <div id="sub-eng" class="sub-materials">
        <div class="empty-btn">❌ Brak Materiału</div>
    </div>

    <button class="subject-btn" onclick="toggleSub('sub-ger')">
        <img src="pogoda.png" alt="Niemiecki" class="subject-icon">
        <span class="subject-text">Niemiecki</span> <span>▼</span>
    </button>
    <div id="sub-ger" class="sub-materials">
        <div class="lesson-row">
            <a href="dasWetterNIEMIECKI.html" class="lesson-link">das Wetter - pogoda</a>
            <button class="study-btn" onclick="openStudySheet('german')">Materiał 📖</button>
        </div>
    </div>

    <button class="subject-btn" onclick="toggleSub('sub-geo')">
        <img src="ameryka.png" alt="Geografia" class="subject-icon">
        <span class="subject-text">Geografia</span> <span>▼</span>
    </button>
    <div id="sub-geo" class="sub-materials">
        <div class="lesson-row">
            <a href="amerykaGEOGRAFIA.html" class="lesson-link">Ameryka - Sprawdzian</a>
            <button class="study-btn" onclick="openStudySheet('geography')">Materiał 📖</button>
        </div>
    </div>

    <button class="subject-btn" onclick="toggleSub('sub-oth')">
        <span class="subject-text">Inne</span> <span>▼</span>
    </button>
    <div id="sub-oth" class="sub-materials">
        <div class="empty-btn">❌ Brak Materiału</div>
    </div>
</div>

<div id="screen-study" class="app-screen">
    <div style="display: flex; align-items: center; margin-bottom: 10px;">
        <button class="exit-btn" onclick="switchScreen('screen-materials')">✖️ WRÓĆ DO MENU</button>
    </div>
    <div class="header-title" id="study-title" style="font-size: 24px; margin-bottom: 10px; margin-top: 0; text-align: left;">Zakres</div>
    <div class="study-list" id="study-list-box"></div>
</div>

<script>
    const germanData = [
        { q: "das Wetter", a: "pogoda" }, { q: "Wie ist das Wetter heute?", a: "Jaka jest dziś pogoda?" },
        { q: "Das Wetter ist schön.", a: "Pogoda jest piękna." }, { q: "Das Wetter ist gut.", a: "Jest ładna pogoda." },
        { q: "Das Wetter ist schlecht.", a: "Jest brzydka pogoda." }, { q: "das Eis", a: "lód" },
        { q: "der Himmel", a: "niebo" }, { q: "die Sonne", a: "słońce" }, { q: "die Wolke", a: "chmura" },
        { q: "der Regen", a: "deszcz" }, { q: "der Schnee", a: "śnieg" }, { q: "der Wind", a: "wiatr" },
        { q: "der Nebel", a: "mgła" }, { q: "der Hagel", a: "grad" }, { q: "Es ist warm.", a: "Jest ciepło." },
        { q: "Es ist kalt.", a: "Jest zimno." }, { q: "Es ist heiß.", a: "Jest gorąco." },
        { q: "Es ist kühl.", a: "Jest chłodno." }, { q: "Grad", a: "stopnie" },
        { q: "Wie viel Grad sind es heute?", a: "Ile jest dzisiaj stopni?" }, { q: "Es sind 20 Grad.", a: "Jest 20 stopni." }
    ];

    const geoData = [
        { q: "Największy system rzeczny Ameryki Płd.", a: "Amazonka" },
        { q: "W jakiej strefie leży Ameryka Środkowa?", a: "międzyzwrotnikowej" },
        { q: "Skutek tornada (drzewa)", a: "wyrywanie z korzeniami" },
        { q: "Skutek cyklonu (opady)", a: "podtopienia i powodzie" },
        { q: "Lokalna nazwa cyklonu w Azji Wschodniej", a: "tajfun" },
        { q: "Skala do określania siły tornad", a: "Fujity" },
        { q: "Skala do określania siły cyklonów", a: "Saffira-Simpsona" },
        { q: "Główny układ form rzeźby terenu Ameryki", a: "południkowy" },
        { q: "Potomkowie białej odmiany i Indian", a: "Metysi" },
        { q: "Potomkowie odmiany czarnej i Indian", a: "Zambo" },
        { q: "Potomkowie odmiany białej i czarnej", a: "Mulaci" },
        { q: "Światowe centrum branży IT w USA", a: "Dolina Krzemowa" },
        { q: "Negatywny skutek wylesiania Amazonii", a: "utrata bioróżnorodności" },
        { q: "Przyczyna powstawania slumsów (faveli)", a: "zbyt duży napływ ludności" }
    ];

    function switchScreen(screenId) {
        document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function toggleSub(subId) {
        document.querySelectorAll('.sub-materials').forEach(sub => {
            if(sub.id !== subId) sub.classList.remove('open');
        });
        document.getElementById(subId).classList.toggle('open');
    }

    function openStudySheet(subject) {
        const listBox = document.getElementById('study-list-box');
        const titleBox = document.getElementById('study-title');
        listBox.innerHTML = "";
        
        let currentSet = subject === 'german' ? germanData : geoData;
        titleBox.textContent = subject === 'german' ? "Zakres: das Wetter (Niemiecki)" : "Zakres: Ameryka (Geografia)";

        currentSet.forEach(item => {
            const row = document.createElement('div');
            row.className = 'study-item';
            row.innerHTML = `
                <div class="study-left" style="font-size:14px;">${item.q}</div>
                <div class="study-right" style="font-weight:bold; color:var(--primary); font-size:14px;">${item.a}</div>
            `;
            listBox.appendChild(row);
        });
        switchScreen('screen-study');
    }
</script>
</body>
</html>
